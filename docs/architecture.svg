<svg viewBox="0 0 900 1020" xmlns="http://www.w3.org/2000/svg" role="img" font-family="'Segoe UI', system-ui, -apple-system, sans-serif">
  <title>TripMind System Architecture</title>
  <desc>Five-phase pipeline: synthetic data, multi-agent orchestration with MCP servers, QLoRA training, evaluation, and FastAPI serving.</desc>

  <defs>
    <marker id="arr" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="6" markerHeight="6" orient="auto">
      <path d="M0 1.5 L8.5 5 L0 8.5 z" fill="#9CA3AF"/>
    </marker>
  </defs>

  <!-- Background -->
  <rect width="900" height="1020" fill="#FAFAFA"/>

  <!-- TITLE -->
  <text x="450" y="32" text-anchor="middle" font-size="17" font-weight="700" fill="#111827">TripMind — System Architecture</text>

  <!-- SEED PERSONAS -->
  <rect x="320" y="46" width="260" height="48" rx="8" fill="#EEF2FF" stroke="#818CF8" stroke-width="1.5"/>
  <text x="450" y="65" text-anchor="middle" font-size="12" font-weight="600" fill="#4338CA">Seed Personas</text>
  <text x="450" y="83" text-anchor="middle" font-size="10" fill="#6B7280">50,000 traveler profiles</text>

  <line x1="450" y1="94" x2="450" y2="122" stroke="#9CA3AF" stroke-width="1.5" marker-end="url(#arr)"/>

  <!-- PHASE 1 -->
  <rect x="55" y="124" width="790" height="118" rx="10" fill="#FFF7ED" stroke="#F97316" stroke-width="1.5"/>
  <rect x="55" y="124" width="790" height="26" rx="10" fill="#F97316"/>
  <rect x="55" y="138" width="790" height="12" fill="#F97316"/>
  <text x="75" y="142" font-size="11" font-weight="700" fill="white">PHASE 1 — Synthetic Data Engine</text>

  <rect x="72" y="158" width="196" height="68" rx="6" fill="#FFEDD5" stroke="#FB923C" stroke-width="1"/>
  <text x="170" y="177" text-anchor="middle" font-size="11" font-weight="600" fill="#C2410C">GPT-4o-mini</text>
  <text x="170" y="193" text-anchor="middle" font-size="10" fill="#78350F">gpt-4o-mini teacher</text>
  <text x="170" y="208" text-anchor="middle" font-size="10" fill="#78350F">$4 · 5,000 calls</text>

  <line x1="268" y1="192" x2="298" y2="192" stroke="#9CA3AF" stroke-width="1.5" marker-end="url(#arr)"/>

  <rect x="298" y="158" width="210" height="68" rx="6" fill="#FFEDD5" stroke="#FB923C" stroke-width="1"/>
  <text x="403" y="177" text-anchor="middle" font-size="11" font-weight="600" fill="#C2410C">3-Gate Validator</text>
  <text x="403" y="193" text-anchor="middle" font-size="10" fill="#78350F">hostel · savings gate</text>
  <text x="403" y="208" text-anchor="middle" font-size="10" fill="#78350F">budget bounds · ~12% reject</text>

  <line x1="508" y1="192" x2="538" y2="192" stroke="#9CA3AF" stroke-width="1.5" marker-end="url(#arr)"/>

  <rect x="538" y="158" width="290" height="68" rx="6" fill="#FFEDD5" stroke="#FB923C" stroke-width="1"/>
  <text x="683" y="177" text-anchor="middle" font-size="11" font-weight="600" fill="#C2410C">5,000 Training Pairs</text>
  <text x="683" y="193" text-anchor="middle" font-size="10" fill="#78350F">(baseline, optimized) itineraries</text>
  <text x="683" y="208" text-anchor="middle" font-size="10" fill="#78350F">+ pivot_analysis · Alpaca format</text>

  <line x1="450" y1="242" x2="450" y2="274" stroke="#9CA3AF" stroke-width="1.5" marker-end="url(#arr)"/>

  <!-- PHASE 2 -->
  <rect x="55" y="276" width="790" height="252" rx="10" fill="#F0FDF4" stroke="#22C55E" stroke-width="1.5"/>
  <rect x="55" y="276" width="790" height="26" rx="10" fill="#16A34A"/>
  <rect x="55" y="290" width="790" height="12" fill="#16A34A"/>
  <text x="75" y="294" font-size="11" font-weight="700" fill="white">PHASE 2 — Multi-Agent Orchestration</text>

  <text x="450" y="318" text-anchor="middle" font-size="10" fill="#6B7280">MCP Servers · official mcp library · SSE transport · disk cache (ttl=86400)</text>

  <rect x="68" y="324" width="178" height="46" rx="5" fill="#DCFCE7" stroke="#4ADE80" stroke-width="1"/>
  <text x="157" y="342" text-anchor="middle" font-size="10" font-weight="600" fill="#15803D">routing_server.py :8001</text>
  <text x="157" y="358" text-anchor="middle" font-size="9" fill="#6B7280">ORS · Nominatim</text>

  <rect x="256" y="324" width="178" height="46" rx="5" fill="#DCFCE7" stroke="#4ADE80" stroke-width="1"/>
  <text x="345" y="342" text-anchor="middle" font-size="10" font-weight="600" fill="#15803D">hotels_server.py :8002</text>
  <text x="345" y="358" text-anchor="middle" font-size="9" fill="#6B7280">Overpass + haversine</text>

  <rect x="444" y="324" width="195" height="46" rx="5" fill="#DCFCE7" stroke="#4ADE80" stroke-width="1"/>
  <text x="541" y="342" text-anchor="middle" font-size="10" font-weight="600" fill="#15803D">overpass_server.py :8003</text>
  <text x="541" y="358" text-anchor="middle" font-size="9" fill="#6B7280">OSM POIs · restaurants</text>

  <rect x="649" y="324" width="178" height="46" rx="5" fill="#DCFCE7" stroke="#4ADE80" stroke-width="1"/>
  <text x="738" y="342" text-anchor="middle" font-size="10" font-weight="600" fill="#15803D">search_server.py :8004</text>
  <text x="738" y="358" text-anchor="middle" font-size="9" fill="#6B7280">DuckDuckGo</text>

  <line x1="450" y1="370" x2="450" y2="395" stroke="#9CA3AF" stroke-width="1.5" marker-end="url(#arr)"/>
  <text x="510" y="386" font-size="9" fill="#6B7280">DeepSeek V4 Flash · $4</text>

  <!-- Supervisor dashed border -->
  <rect x="66" y="398" width="766" height="118" rx="7" fill="none" stroke="#86EFAC" stroke-width="1" stroke-dasharray="5,4"/>
  <text x="82" y="413" font-size="9" fill="#6B7280">Supervisor — async · concurrency 3 · checkpoint-resume · quality filter → 500 traces</text>

  <rect x="80" y="418" width="220" height="86" rx="6" fill="#DCFCE7" stroke="#4ADE80" stroke-width="1"/>
  <text x="190" y="438" text-anchor="middle" font-size="11" font-weight="700" fill="#15803D">Analyst</text>
  <text x="190" y="454" text-anchor="middle" font-size="9" fill="#6B7280">get_route · search_hotels</text>
  <text x="190" y="468" text-anchor="middle" font-size="9" fill="#6B7280">search_flights</text>
  <text x="190" y="482" text-anchor="middle" font-size="9" fill="#374151">→ cost_report</text>
  <text x="190" y="496" text-anchor="middle" font-size="8" fill="#9CA3AF">transit + hotel cost analysis</text>

  <line x1="300" y1="461" x2="330" y2="461" stroke="#9CA3AF" stroke-width="1.5" marker-end="url(#arr)"/>

  <rect x="330" y="418" width="228" height="86" rx="6" fill="#DCFCE7" stroke="#4ADE80" stroke-width="1"/>
  <text x="444" y="438" text-anchor="middle" font-size="11" font-weight="700" fill="#15803D">Concierge</text>
  <text x="444" y="454" text-anchor="middle" font-size="9" fill="#6B7280">search_pois · search_restaurants</text>
  <text x="444" y="468" text-anchor="middle" font-size="9" fill="#6B7280">web_search</text>
  <text x="444" y="482" text-anchor="middle" font-size="9" fill="#374151">→ substitutions</text>
  <text x="444" y="496" text-anchor="middle" font-size="8" fill="#9CA3AF">POI + dining substitutions</text>

  <line x1="558" y1="461" x2="588" y2="461" stroke="#9CA3AF" stroke-width="1.5" marker-end="url(#arr)"/>

  <rect x="588" y="418" width="240" height="86" rx="6" fill="#DCFCE7" stroke="#4ADE80" stroke-width="1"/>
  <text x="708" y="438" text-anchor="middle" font-size="11" font-weight="700" fill="#15803D">Optimizer</text>
  <text x="708" y="454" text-anchor="middle" font-size="9" fill="#6B7280">all tools (final lookups)</text>
  <text x="708" y="468" text-anchor="middle" font-size="9" fill="#6B7280">optimized itinerary</text>
  <text x="708" y="482" text-anchor="middle" font-size="9" fill="#374151">→ pivot_analysis</text>
  <text x="708" y="496" text-anchor="middle" font-size="8" fill="#9CA3AF">500 reasoning traces</text>

  <line x1="450" y1="528" x2="450" y2="558" stroke="#9CA3AF" stroke-width="1.5" marker-end="url(#arr)"/>
  <text x="495" y="547" font-size="9" fill="#6B7280">+ llama3.1:8b baseline</text>

  <!-- PHASE 3 -->
  <rect x="55" y="560" width="790" height="158" rx="10" fill="#FAF5FF" stroke="#A855F7" stroke-width="1.5"/>
  <rect x="55" y="560" width="790" height="26" rx="10" fill="#9333EA"/>
  <rect x="55" y="574" width="790" height="12" fill="#9333EA"/>
  <text x="75" y="578" font-size="11" font-weight="700" fill="white">PHASE 3 — QLoRA Fine-Tuning  (Llama 3.1 8B · Unsloth · r=8)</text>

  <rect x="68" y="596" width="238" height="106" rx="7" fill="#F3E8FF" stroke="#C084FC" stroke-width="1.5"/>
  <text x="187" y="617" text-anchor="middle" font-size="12" font-weight="700" fill="#7E22CE">tripmind-ft</text>
  <text x="187" y="635" text-anchor="middle" font-size="10" fill="#6B7280">SFT · 4,749 Phase 1 pairs</text>
  <text x="187" y="651" text-anchor="middle" font-size="10" fill="#6B7280">Colab T4 · fp16 · 3 epochs</text>
  <text x="187" y="667" text-anchor="middle" font-size="10" fill="#6B7280">final loss 0.225</text>
  <text x="187" y="683" text-anchor="middle" font-size="10" font-weight="600" fill="#7E22CE">GGUF Q4_K_M · 4.6 GB</text>

  <rect x="330" y="596" width="238" height="106" rx="7" fill="#F3E8FF" stroke="#C084FC" stroke-width="1.5"/>
  <text x="449" y="617" text-anchor="middle" font-size="12" font-weight="700" fill="#7E22CE">tripmind-distill</text>
  <text x="449" y="635" text-anchor="middle" font-size="10" fill="#6B7280">KD · 449 Phase 2 traces</text>
  <text x="449" y="651" text-anchor="middle" font-size="10" fill="#6B7280">Lightning A100 · bf16 · 5 epochs</text>
  <text x="449" y="667" text-anchor="middle" font-size="10" fill="#6B7280">final loss 0.254</text>
  <text x="449" y="683" text-anchor="middle" font-size="10" font-weight="600" fill="#7E22CE">GGUF Q4_K_M · 4.6 GB</text>

  <rect x="592" y="596" width="240" height="106" rx="7" fill="#F3E8FF" stroke="#C084FC" stroke-width="1.5"/>
  <text x="712" y="617" text-anchor="middle" font-size="12" font-weight="700" fill="#7E22CE">tripmind-curriculum</text>
  <text x="712" y="635" text-anchor="middle" font-size="10" fill="#6B7280">2-stage: Phase 1 → Phase 2</text>
  <text x="712" y="651" text-anchor="middle" font-size="10" fill="#6B7280">Lightning A100 · lr decay 4×</text>
  <text x="712" y="667" text-anchor="middle" font-size="10" fill="#6B7280">loss 0.241 / 0.505</text>
  <text x="712" y="683" text-anchor="middle" font-size="10" font-weight="600" fill="#7E22CE">GGUF Q4_K_M · 4.6 GB</text>

  <line x1="450" y1="718" x2="450" y2="748" stroke="#9CA3AF" stroke-width="1.5" marker-end="url(#arr)"/>

  <!-- PHASE 4 -->
  <rect x="55" y="750" width="790" height="128" rx="10" fill="#FFF1F2" stroke="#F43F5E" stroke-width="1.5"/>
  <rect x="55" y="750" width="790" height="26" rx="10" fill="#E11D48"/>
  <rect x="55" y="764" width="790" height="12" fill="#E11D48"/>
  <text x="75" y="768" font-size="11" font-weight="700" fill="white">PHASE 4 — Evaluation &amp; Red Teaming</text>

  <rect x="68" y="786" width="232" height="78" rx="6" fill="#FFE4E6" stroke="#FDA4AF" stroke-width="1"/>
  <text x="184" y="806" text-anchor="middle" font-size="11" font-weight="600" fill="#BE123C">Golden Set · 92 cases</text>
  <text x="184" y="822" text-anchor="middle" font-size="9" fill="#6B7280">JSON · savings · budget · schema</text>
  <text x="184" y="837" text-anchor="middle" font-size="9" fill="#6B7280">ROUGE-L · BERTScore · alignment</text>
  <text x="184" y="853" text-anchor="middle" font-size="9" fill="#6B7280">all-MiniLM-L6-v2 (local)</text>

  <rect x="334" y="786" width="232" height="78" rx="6" fill="#FFE4E6" stroke="#FDA4AF" stroke-width="1"/>
  <text x="450" y="806" text-anchor="middle" font-size="11" font-weight="600" fill="#BE123C">LLM-as-Judge</text>
  <text x="450" y="822" text-anchor="middle" font-size="9" fill="#6B7280">DeepSeek V4 Flash judge</text>
  <text x="450" y="837" text-anchor="middle" font-size="9" fill="#6B7280">reasoning coherence</text>
  <text x="450" y="853" text-anchor="middle" font-size="9" fill="#6B7280">grounding accuracy</text>

  <rect x="600" y="786" width="232" height="78" rx="6" fill="#FFE4E6" stroke="#FDA4AF" stroke-width="1"/>
  <text x="716" y="806" text-anchor="middle" font-size="11" font-weight="600" fill="#BE123C">Red Teaming · 45 cases</text>
  <text x="716" y="822" text-anchor="middle" font-size="9" fill="#6B7280">adversarial prompts</text>
  <text x="716" y="837" text-anchor="middle" font-size="9" fill="#6B7280">budget constraint violations</text>
  <text x="716" y="853" text-anchor="middle" font-size="9" fill="#6B7280">injection attempts</text>

  <line x1="450" y1="878" x2="450" y2="906" stroke="#9CA3AF" stroke-width="1.5" marker-end="url(#arr)"/>

  <!-- PHASE 5 -->
  <rect x="55" y="908" width="790" height="100" rx="10" fill="#F0F9FF" stroke="#0EA5E9" stroke-width="1.5"/>
  <rect x="55" y="908" width="790" height="26" rx="10" fill="#0284C7"/>
  <rect x="55" y="922" width="790" height="12" fill="#0284C7"/>
  <text x="75" y="926" font-size="11" font-weight="700" fill="white">PHASE 5 — FastAPI Inference Server  (async · Pydantic validation · Swagger /docs)</text>

  <rect x="68" y="942" width="128" height="54" rx="5" fill="#E0F2FE" stroke="#38BDF8" stroke-width="1"/>
  <text x="132" y="962" text-anchor="middle" font-size="10" font-weight="600" fill="#0369A1">GET /health</text>
  <text x="132" y="978" text-anchor="middle" font-size="9" fill="#6B7280">Ollama ping</text>
  <text x="132" y="990" text-anchor="middle" font-size="9" fill="#6B7280">model list</text>

  <rect x="208" y="942" width="128" height="54" rx="5" fill="#E0F2FE" stroke="#38BDF8" stroke-width="1"/>
  <text x="272" y="962" text-anchor="middle" font-size="10" font-weight="600" fill="#0369A1">GET /models</text>
  <text x="272" y="978" text-anchor="middle" font-size="9" fill="#6B7280">4 models +</text>
  <text x="272" y="990" text-anchor="middle" font-size="9" fill="#6B7280">descriptions</text>

  <rect x="348" y="942" width="202" height="54" rx="5" fill="#BAE6FD" stroke="#0EA5E9" stroke-width="2"/>
  <text x="449" y="962" text-anchor="middle" font-size="11" font-weight="700" fill="#0369A1">POST /optimize</text>
  <text x="449" y="978" text-anchor="middle" font-size="9" fill="#0C4A6E">persona → itinerary</text>
  <text x="449" y="990" text-anchor="middle" font-size="9" fill="#0C4A6E">model registry validated</text>

  <rect x="562" y="942" width="168" height="54" rx="5" fill="#E0F2FE" stroke="#38BDF8" stroke-width="1"/>
  <text x="646" y="962" text-anchor="middle" font-size="10" font-weight="600" fill="#0369A1">GET /results</text>
  <text x="646" y="978" text-anchor="middle" font-size="9" fill="#6B7280">/summary · /compare</text>
  <text x="646" y="990" text-anchor="middle" font-size="9" fill="#6B7280">instant · no inference</text>

  <rect x="742" y="942" width="96" height="54" rx="5" fill="#E0F2FE" stroke="#38BDF8" stroke-width="1"/>
  <text x="790" y="962" text-anchor="middle" font-size="10" font-weight="600" fill="#0369A1">Swagger</text>
  <text x="790" y="978" text-anchor="middle" font-size="9" fill="#6B7280">/docs</text>
  <text x="790" y="990" text-anchor="middle" font-size="9" fill="#6B7280">auto-gen</text>

</svg>
